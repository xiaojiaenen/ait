name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-linux:
    name: ait-linux-x86_64
    runs-on: ubuntu-latest
    container: quay.io/pypa/manylinux2014_x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install deps & Build
        run: |
          /opt/python/cp311-cp311/bin/pip install pyinstaller
          /opt/python/cp311-cp311/bin/pip install -e .
          /opt/python/cp311-cp311/bin/pyinstaller ait.spec --clean --noconfirm

      - name: Rename binary
        run: mv dist/ait ait-linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ait-linux-x86_64
          path: ait-linux-x86_64

  build:
    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: ait-macos-arm64
            ext: ""
          - os: macos-13
            artifact: ait-macos-x86_64
            ext: ""
          - os: windows-latest
            artifact: ait-windows-x86_64
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e .

      - name: Build
        run: pyinstaller ait.spec --clean --noconfirm

      - name: Rename binary
        shell: bash
        run: mv dist/ait${{ matrix.ext }} ${{ matrix.artifact }}${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}${{ matrix.ext }}

  release:
    name: Create Release
    needs: [build-linux, build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*/*
          draft: false
          generate_release_notes: true
