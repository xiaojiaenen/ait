name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: ait-linux-x86_64
            ext: ""
          - os: macos-latest
            artifact: ait-macos-arm64
            ext: ""
          - os: macos-13
            artifact: ait-macos-x86_64
            ext: ""
          - os: windows-latest
            artifact: ait-windows-x86_64
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      - name: Build Linux (manylinux2014 — CentOS 7 / GLIBC 2.17)
        if: runner.os == 'Linux'
        run: |
          docker run --rm \
            -v "$(pwd):/workspace" \
            -w /workspace \
            quay.io/pypa/manylinux2014_x86_64 \
            bash -ex -c "
              /opt/python/cp311-cp311/bin/pip install --upgrade pip
              /opt/python/cp311-cp311/bin/pip install pyinstaller
              /opt/python/cp311-cp311/bin/pip install -e .
              /opt/python/cp311-cp311/bin/pyinstaller ait.spec --clean --noconfirm
              chown -R $(id -u):$(id -g) dist/
            "
          echo '=== Build output ==='
          ls -lh dist/
          file dist/ait

      - name: Set up Python (macOS / Windows)
        if: runner.os != 'Linux'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps (macOS / Windows)
        if: runner.os != 'Linux'
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e .

      - name: Build (macOS / Windows)
        if: runner.os != 'Linux'
        run: pyinstaller ait.spec --clean --noconfirm

      - name: Rename binary
        shell: bash
        run: mv dist/ait${{ matrix.ext }} ${{ matrix.artifact }}${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}${{ matrix.ext }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*/*
          draft: false
          generate_release_notes: true
